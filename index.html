<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mój Sklep - Pluginy i Gry</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="logo">MOJ SKLEP</div>
        <ul>
            <li><a href="#">Strona Główna</a></li>
            <li><a href="#produkty">Produkty</a></li>
            <li><a href="#">Kontakt</a></li>
        </ul>
    </nav>

    <header>
        <h1>Witaj w moim sklepie!</h1>
        <p>Najlepsze pluginy Minecraft i dodatki do Roblox.</p>
    </header>

    <main id="produkty">
        <div class="card">
            <img src="https://via.placeholder.com/250x150" alt="Plugin">
            <h3>Super Plugin MC</h3>
            <p>Unikalny system ekonomii na Twój serwer.</p>
            <div class="price">29.99 PLN</div>
            <button class="buy-btn">Kup Teraz</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/250x150" alt="Roblox">
            <h3>Mapa Roblox</h3>
            <p>Gotowy model mapy typu Tycoon.</p>
            <div class="price">15.00 PLN</div>
            <button class="buy-btn">Kup Teraz</button>
        </div>
    </main>

</body>
</html>
